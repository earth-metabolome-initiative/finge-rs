name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Check out sources
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --check

      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run default test suite
        run: cargo test

      - name: Run smiles-support test suite
        run: cargo test --features smiles-support

      - name: Check benchmark target
        run: cargo bench --bench ecfp --features smiles-support --no-run

      - name: Check AtomPair benchmark target
        run: cargo bench --bench atom_pair --features smiles-support --no-run
